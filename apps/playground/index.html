<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drishya | Professional Charting</title>
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #09090b;
        --font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background-color: var(--bg-color);
        color: #e4e4e7;
        font-family: var(--font-family);
      }
      #chart-root {
        width: 100%;
        height: 100%;
      }
      /* Optional overlay for loading */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #09090b;
        z-index: 1000;
        transition: opacity 0.5s ease;
      }
      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div style="text-align: center;">
        <h1 style="font-weight: 600; letter-spacing: -0.02em; color: #6366f1;">DRISHYA</h1>
        <p style="font-size: 12px; color: #52525b;">Initializing WASM Engine...</p>
      </div>
    </div>
    <div id="chart-root"></div>
    <script type="module" src="./main.js?v=5"></script>
  </body>
</html>
